volumes:
  pg_data_production:
  static_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
    restart: always

  backend:
    image: lackfadiriso/taski_backend
    env_file: .env
    volumes:
      - static_volume:/backend_static
    restart: always

  frontend:
    image: lackfadiriso/taski_frontend
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static
    restart: unless-stopped
  
  gateway:
    image: lackfadiriso/taski_gateway
    env_file: .env
    volumes:
      - static_volume:/staticfiles/
    ports:
      - 8000:80
    restart: always