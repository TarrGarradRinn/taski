server {
    listen 80;
    return 301 https://$host:9009$request_uri;
}

server {
    listen 443 ssl;
    server_name tarrgarrad.ddns.net;

    ssl_certificate /etc/letsencrypt/live/tarrgarrad.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tarrgarrad.ddns.net/privkey.pem;

    index index.html;

    location /api/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8000/api/;
    }
    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8000/admin/;
    }
    location /media/ {
        alias /media/;
    }
    location / {
        alias /static/;
        try_files $uri $uri/ /index.html;
    }
}